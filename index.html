<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ══════════════════════════════════════
           🎨 ADJUST LOGO SIZE HERE
           ══════════════════════════════════════ */
        :root {
            --logo-width: 220px;   /* Change this */
            --logo-height: auto;   /* Use 'auto' to keep aspect ratio, or set a fixed px value like '80px' */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
            color: #2d3748;
            padding: 20px;
        }

        /* ── Logo ── */
        .logo-area {
            margin-bottom: 40px;
            text-align: center;
        }

        .logo-area img {
            width: var(--logo-width);
            height: var(--logo-height);
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .logo-placeholder {
            width: var(--logo-width);
            height: var(--logo-height);
            min-height: 80px;
            border: 2px dashed rgba(45, 55, 72, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: rgba(45, 55, 72, 0.5);
            text-align: center;
            padding: 10px;
            margin: 0 auto;
        }

        /* ── Countdown Card ── */
        .card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 48px 56px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }

        .message {
            font-size: 18px;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .destination {
            font-size: 22px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 32px;
            word-break: break-all;
        }

        .destination a {
            color: #5a67d8;
            text-decoration: none;
        }

        .destination a:hover {
            text-decoration: underline;
        }

        /* ── Countdown Ring ── */
        .countdown-wrap {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 12px;
        }

        .countdown-ring {
            transform: rotate(-90deg);
        }

        .countdown-ring circle {
            fill: none;
            stroke-width: 6;
        }

        .ring-bg {
            stroke: rgba(90, 103, 216, 0.15);
        }

        .ring-progress {
            stroke: #5a67d8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .countdown-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 42px;
            font-weight: 700;
            color: #2d3748;
        }

        /* ── Go / Pause Button ── */
        .pause-btn {
            background: rgba(90, 103, 216, 0.15);
            border: 1px solid rgba(90, 103, 216, 0.3);
            color: #5a67d8;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .pause-btn:hover {
            background: rgba(90, 103, 216, 0.25);
            color: #434190;
        }

        .pause-btn.pause-active {
            background: #5a67d8;
            color: #fff;
            border-color: #5a67d8;
        }

        /* ── Link Bar ── */
        .link-bar {
            margin-top: 48px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-width: 600px;
            width: 100%;
        }

        .link-bar a {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 14px;
            padding: 12px 22px;
            color: #2d3748;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .link-bar a:hover {
            background: rgba(255, 255, 255, 0.85);
            color: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(31, 38, 135, 0.15);
        }

        .link-bar a i {
            font-size: 18px;
            color: #5a67d8;
        }

        /* Brand icon colors */
        .link-bar a .fa-instagram { color: #E1306C; }
        .link-bar a .fa-facebook  { color: #1877F2; }
        .link-bar a .fa-tiktok    { color: #000000; }
        .link-bar a .fa-globe     { color: #5a67d8; }

        /* ── Footer ── */
        .footer {
            margin-top: 48px;
            font-size: 12px;
            color: rgba(45, 55, 72, 0.6);
        }

        .footer a {
            color: rgba(45, 55, 72, 0.7);
            text-decoration: none;
        }

        .footer a:hover {
            color: #2d3748;
        }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            .card {
                padding: 36px 28px;
            }
            .destination {
                font-size: 18px;
            }
            .link-bar a {
                padding: 10px 18px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- ══════════════════════════════════════
         LOGO — Replace src with your logo URL
         ══════════════════════════════════════ -->
    <div class="logo-area">
        <!-- OPTION A: Use an image -->
   <img src="itesteye.png" alt="Logo">

    </div>

    <!-- ══════════════════════════════════════
         COUNTDOWN CARD
         ══════════════════════════════════════ -->
    <div class="card">
        <p class="message">Redirecting you to</p>
        <p class="destination">
            <a href="https://instagram.com/itesteye" id="targetLink">instagram.com/itesteye</a>
        </p>

        <!-- Countdown Ring -->
        <div class="countdown-wrap">
            <svg class="countdown-ring" width="120" height="120" viewBox="0 0 120 120">
                <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
                <circle class="ring-progress" id="progress" cx="60" cy="60" r="52"
                        stroke-dasharray="326.73"
                        stroke-dashoffset="0"></circle>
            </svg>
            <div class="countdown-number" id="countNum">5</div>
        </div>

        <!-- Go / Pause Button -->
        <button class="pause-btn" id="pauseBtn">
            <i class="fa-solid fa-play" id="pauseIcon"></i>
            <span id="pauseLabel">Go</span>
        </button>
    </div>

    <!-- ══════════════════════════════════════
         LINK BAR — Add/remove as many as you want
         ══════════════════════════════════════ -->
    <div class="link-bar">
        <a href="https://instagram.com/itesteye" target="_blank">
            <i class="fa-brands fa-instagram"></i> Instagram
        </a>
        <a href="https://facebook.com/itesteye" target="_blank">
            <i class="fa-brands fa-facebook"></i> Facebook
        </a>
        <a href="https://tiktok.com/@itesteye" target="_blank">
            <i class="fa-brands fa-tiktok"></i> TikTok
        </a>
        <a href="https://akhtar.co.za" target="_blank">
            <i class="fa-solid fa-globe"></i> Website
        </a>
        <a href="https://itesteye.com/cv" target="_blank">
            <i class="fa-solid fa-user-tie"></i> Resume
        </a>
        <!-- ✏️ Add more links here:
        <a href="YOUR_URL" target="_blank">
            <i class="fa-brands fa-YOUR_ICON"></i> Label
        </a>
        -->
    </div>

    <!-- ══════════════════════════════════════
         FOOTER
         ══════════════════════════════════════ -->
    <div class="footer">
        &copy; 2026 <a href="https://akhtar.co.za">Akhtar.co.za</a>
    </div>

    <!-- ══════════════════════════════════════
         REDIRECT LOGIC
         ══════════════════════════════════════ -->
    <script>
        const TARGET_URL   = "https://instagram.com/itesteye";
        const COUNTDOWN    = 5; // seconds

        const countNum    = document.getElementById("countNum");
        const progress    = document.getElementById("progress");
        const pauseBtn    = document.getElementById("pauseBtn");
        const pauseIcon   = document.getElementById("pauseIcon");
        const pauseLabel  = document.getElementById("pauseLabel");
        const circumference = 2 * Math.PI * 52; // r=52

        let remaining = COUNTDOWN;
        let timer = null;
        let isPaused = true; // Start paused

        function tick() {
            remaining--;
            countNum.textContent = remaining;

            // Animate ring
            const offset = circumference * (1 - remaining / COUNTDOWN);
            progress.style.strokeDashoffset = offset;

            if (remaining <= 0) {
                clearInterval(timer);
                window.location.replace(TARGET_URL);
            }
        }

        function startTimer() {
            timer = setInterval(tick, 1000);
        }

        // Go / Pause / Resume Logic
        pauseBtn.addEventListener("click", () => {
            if (isPaused) {
                // Start or Resume
                startTimer();
                pauseLabel.textContent = "Pause";
                pauseIcon.className = "fa-solid fa-pause";
                pauseBtn.classList.add("pause-active");
            } else {
                // Pause
                clearInterval(timer);
                pauseLabel.textContent = "Resume";
                pauseIcon.className = "fa-solid fa-play";
                pauseBtn.classList.remove("pause-active");
            }
            isPaused = !isPaused;
        });
    </script>

</body>
</html>
